name = "scenestealer-api"
main = "src/index.ts"
compatibility_date = "2025-01-01"
compatibility_flags = ["nodejs_compat"]

# Provisioned by scenestealer-infra — see that repo's opentofu/README.md.
# [[queues.producers]]
# queue = "scenestealer-jobs"
# binding = "JOBS_QUEUE"

[vars]
# Non-secret config only. Secrets (DATABASE_URL, CLERK_SECRET_KEY,
# STRIPE_SECRET_KEY, POSTIZ_API_KEY, R2_ACCESS_KEY_ID,
# R2_SECRET_ACCESS_KEY) are set via `wrangler secret put`, never committed
# here. R2_ACCOUNT_ID and R2_BUCKET_NAME aren't sensitive, but are set the
# same way for now rather than split across two mechanisms.

